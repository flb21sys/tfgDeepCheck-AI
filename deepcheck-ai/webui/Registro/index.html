<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepCheck - Registro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="login-split-body">
    <!-- Left Side: Art/Branding -->
    <div class="login-art-side">
        <div class="animated-bg">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
        <div class="logo-icon huge"
            style="background: white; color: var(--accent-primary); position: relative; z-index: 2;">
            <i class="ph-fill ph-user-plus"></i>
        </div>
        <h1 style="position: relative; z-index: 2;">Únete a DeepCheck</h1>
        <p style="opacity: 0.9; font-size: 1.1rem; position: relative; z-index: 2;">Tu copiloto de seguridad inteligente
        </p>
    </div>

    <!-- Right Side: Form -->
    <div class="login-form-side">
        <a href="../Acceso/index.html" class="admin-login-link">
            <i class="ph ph-arrow-left"></i> Volver al Login
        </a>

        <div class="auth-card flat">
            <div class="auth-header">
                <h2>Crear Cuenta</h2>
                <p>Completa tus datos para empezar</p>
            </div>

            <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
                <fieldset>
                    <legend>Información Personal</legend>

                    <div class="form-group">
                        <label for="reg-username">Usuario</label>
                        <div class="input-wrapper">
                            <i class="ph ph-user"></i>
                            <input type="text" id="reg-username" placeholder="Elige un nombre de usuario" required
                                autofocus>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="reg-email">Email</label>
                        <div class="input-wrapper">
                            <i class="ph ph-envelope"></i>
                            <input type="email" id="reg-email" placeholder="tu@email.com" required>
                        </div>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Seguridad</legend>
                    <div class="form-group">
                        <label for="reg-password">Contraseña</label>
                        <div class="input-wrapper">
                            <i class="ph ph-lock-key"></i>
                            <input type="password" id="reg-password" placeholder="••••••••" required
                                pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                                title="8+ caracteres, 1 mayúscula, 1 número">
                        </div>
                    </div>
                </fieldset>

                <button type="submit" class="primary-btn full-width">
                    <span>Crear Cuenta</span>
                    <i class="ph ph-check"></i>
                </button>
            </form>

            <div class="auth-footer" style="text-align: center; margin-top: 2rem;">
                <p>¿Ya tienes cuenta? <a href="../Acceso/index.html">Inicia Sesión</a></p>
            </div>
        </div>
    </div>
    <script src="../assets/script.js"></script>
</body>

</html>
