<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepCheck - Iniciar Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="login-split-body">
    <!-- Left Side: Art/Branding -->
    <div class="login-art-side">
        <div class="logo-icon huge" style="background: white; color: var(--accent-primary);">
            <i class="ph-fill ph-shield-check"></i>
        </div>
        <h1>DeepCheck AI</h1>
        <p style="opacity: 0.9; font-size: 1.1rem;">Tu copiloto de seguridad inteligente</p>
    </div>

    <!-- Right Side: Form -->
    <div class="login-form-side">
        <a href="../Admin/login.html" class="admin-login-link">
            <i class="ph ph-lock-key"></i> Acceso Admin
        </a>

        <div class="auth-card flat">
            <div class="auth-header">
                <h2>Bienvenido de nuevo</h2>
                <p>Introduce tus credenciales para acceder</p>
            </div>

            <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
                <fieldset>
                    <legend>Credenciales</legend>

                    <div class="form-group">
                        <label for="username">Usuario</label>
                        <div class="input-wrapper">
                            <i class="ph ph-user"></i>
                            <input type="text" id="username" placeholder="Tu nombre de usuario" required autofocus>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <div class="input-wrapper">
                            <i class="ph ph-lock-key"></i>
                            <input type="password" id="password" placeholder="••••••••" required pattern=".{8,}"
                                title="Mínimo 8 caracteres">
                        </div>
                    </div>
                </fieldset>

                <div class="form-actions" style="margin-bottom: 1.5rem; text-align: right;">
                    <a href="#" class="forgot-password" style="font-size: 0.85rem;">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="primary-btn full-width">
                    <span>Iniciar Sesión</span>
                    <i class="ph ph-arrow-right"></i>
                </button>
            </form>

            <div class="auth-footer" style="text-align: center; margin-top: 2rem;">
                <p>¿No tienes cuenta? <a href="../Registro/index.html">Regístrate</a></p>
            </div>
        </div>
    </div>
    <script src="../assets/script.js"></script>
</body>

</html>
